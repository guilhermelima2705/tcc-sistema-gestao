spring:
  application:
    name: ProjetoFinalSalaoCarmemLucia

  datasource:
    url: jdbc:mysql://localhost:3306/salao_db
    username: admin
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB